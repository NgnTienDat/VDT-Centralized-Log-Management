input {
  # Mở cổng nhận log từ Filebeat (Beats protocol)
  beats {
    port => 5044
  }
}
filter {
  grok {
    match => {
      "message" => '(?m)^%{TIMESTAMP_ISO8601:log_timestamp}\s+\[%{DATA:thread}\]\s+%{LOGLEVEL:log_level}\s+%{NOTSPACE:logger}\s+-\s+%{GREEDYDATA:log_message}'
    }
  }
  if "_grokparsefailure" not in [tags] {
    date {
      match => [ "log_timestamp", "yyyy-MM-dd HH:mm:ss.SSS" ]
      target => "@timestamp"
    }
  }
  mutate {
    add_field => {
      "host_name" => "%{[host][name]}"
    }
  }
}

output {
  # Lưu vào Elasticsearch nếu parse thành công
  if "_grokparsefailure" not in [tags] {
    elasticsearch {
      hosts => ["http://log-monitor-elasticsearch:9200"]
      # Tạo index động theo môi trường và ngày tháng
      index => "sys-logs-%{environment}-%{+YYYY.MM.dd}"
    }
  }

  stdout {
    codec => rubydebug
  }
}
