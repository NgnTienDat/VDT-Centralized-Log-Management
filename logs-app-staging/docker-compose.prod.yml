networks:
  app-test-network:
    name: app-test-network
    driver: bridge

services:
  # -----------------------------------------------
  # Spring Boot app — sinh ra file log tại ./logs/
  # -----------------------------------------------
  logs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logs-app-staging
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - LOGS_DIR=/app/logs
      - SPRING_PROFILES_ACTIVE=staging
    volumes:
      - ./logs:/app/logs
    networks:
      - app-test-network # Đổi sang mạng mới
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8081/actuator/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -----------------------------------------------
  # Filebeat — đọc log local và đẩy thẳng lên EC2
  # -----------------------------------------------
  filebeat:
    image: docker.elastic.co/beats/filebeat:9.2.8
    container_name: filebeat-staging
    user: root
    command: ["--strict.perms=false"]
    restart: unless-stopped
    depends_on:
      logs-app:
        condition: service_healthy
    volumes:
      - ./infras/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/var/log/logs-app:ro
    networks:
      - app-test-network # Đổi sang mạng mới
