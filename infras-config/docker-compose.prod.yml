version: "3.8"

networks:
    log-monitor-network:
        name: log-monitor-network
        driver: bridge

volumes:
    es-data:

services:
    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:9.2.8
        container_name: log-monitor-elasticsearch
        environment:
            - discovery.type=single-node
            - xpack.security.enabled=false
            - ES_JAVA_OPTS=-Xms512m -Xmx512m
        volumes:
            - es-data:/usr/share/elasticsearch/data
        # ports:
        #     - "127.0.0.1:9200:9200" 
        networks:
            - log-monitor-network
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'curl -s http://localhost:9200/_cluster/health | grep -qE ''"status":"(green|yellow)"''',
                ]
            interval: 10s
            timeout: 5s
            retries: 10

    es-init:
        image: curlimages/curl:latest
        container_name: log-monitor-es-init
        depends_on:
            elasticsearch:
                condition: service_healthy
        volumes:
            - ./elasticsearch:/config:ro
        networks:
            - log-monitor-network
        entrypoint:
            [
                "/bin/sh",
                "/config/config/init-es.sh",
                "http://elasticsearch:9200",
            ]
        restart: "no"

    logstash:
        image: docker.elastic.co/logstash/logstash:9.2.8
        container_name: log-monitor-logstash
        depends_on:
            es-init:
                condition: service_completed_successfully
        volumes:
            - ./logstash:/usr/share/logstash/pipeline:ro
        environment:
            - LS_JAVA_OPTS=-Xms256m -Xmx256m
        networks:
            - log-monitor-network
        ports:
            - "5044:5044" # Filebeat/Spring từ server khác đẩy log public vào cổng này
        restart: unless-stopped

    backend:
        image: tiendat964/log-monitor-backend:latest
        container_name: log-monitor-backend
        depends_on:
            elasticsearch:
                condition: service_healthy
        environment:
            - SPRING_PROFILES_ACTIVE=prod
            - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200 
        networks:
            - log-monitor-network
        restart: unless-stopped

    frontend:
        image: tiendat964/log-monitor-frontend:latest
        container_name: log-monitor-frontend
        ports:
            - "80:80" 
        volumes:
            # Mount file cấu hình Nginx Reverse Proxy từ ngoài EC2 vào trong container
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - log-monitor-network
        restart: unless-stopped
