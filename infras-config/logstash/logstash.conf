# =============================================================
# logstash.conf — pipeline duy nhất cho hệ thống log nội bộ
#
# Hỗ trợ 2 format log từ Spring Boot:
#
# Format A — chưa có traceId (file appender cũ):
#   2026-06-05 21:44:17.117 [http-nio-8080-exec-5] INFO  com.dev.logsapp.TestController - Test log
#
# Format B — có traceId sau khi thêm MDC (khuyến nghị):
#   2026-06-05 21:44:17.117 [http-nio-8080-exec-5] [a3f9c12b4e8d1027] INFO  com.dev.logsapp.TestController - Test log
# =============================================================

input {
  beats {
    port => 5044
  }
}

# =============================================================
filter {

  # -----------------------------------------------------------
  # BƯỚC 1: Grok — thử Format B (có traceId) trước
  #         Nếu không match, tự động fallback sang Format A
  #
  # Thay đổi so với config cũ:
  #   - Thêm pattern Format B với group [traceId]
  #   - Dùng list match để Logstash thử lần lượt
  #   - tag_on_failure rõ ràng hơn để dễ debug
  # -----------------------------------------------------------
  grok {
    match => {
      "message" => [

        # Format B — có [traceId]
        '(?m)^%{TIMESTAMP_ISO8601:log_timestamp}\s+\[%{DATA:thread}\]\s+\[%{DATA:trace_id}\]\s+%{LOGLEVEL:log_level}\s+%{NOTSPACE:logger}\s+-\s+%{GREEDYDATA:log_message}',

        # Format A — không có traceId (config cũ của bạn)
        '(?m)^%{TIMESTAMP_ISO8601:log_timestamp}\s+\[%{DATA:thread}\]\s+%{LOGLEVEL:log_level}\s+%{NOTSPACE:logger}\s+-\s+%{GREEDYDATA:log_message}'
      ]
    }
    tag_on_failure => ["_grokparsefailure"]
  }

  # -----------------------------------------------------------
  # BƯỚC 2: Xử lý traceId
  #
  # Nếu log không có traceId (Format A hoặc log nền), Logstash
  # tự sinh UUID để mỗi document trong ES vẫn có unique ID.
  # Tag "no_trace_id" giúp bạn biết đây là ID giả, không phải
  # từ MDC — hữu ích khi debug hoặc query trên Kibana.
  # -----------------------------------------------------------
  if ![trace_id] or [trace_id] == "" {
    uuid {
      target    => "trace_id"
      overwrite => false
    }
    mutate {
      add_tag => ["no_trace_id"]
    }
  }

  # -----------------------------------------------------------
  # BƯỚC 3: Parse timestamp — giữ nguyên logic cũ của bạn
  #         Thêm timezone Asia/Ho_Chi_Minh để @timestamp đúng
  # -----------------------------------------------------------
  if "_grokparsefailure" not in [tags] {
    date {
      match    => ["log_timestamp", "yyyy-MM-dd HH:mm:ss.SSS"]
      target   => "@timestamp"
      timezone => "Asia/Ho_Chi_Minh"
      remove_field => ["log_timestamp"]
    }
  }

  # -----------------------------------------------------------
  # BƯỚC 4: Mutate — mở rộng từ config cũ
  #
  # Thay đổi so với config cũ:
  #   - Giữ host_name như cũ
  #   - Thêm strip để trim khoảng trắng thừa của Spring Boot
  #     (log_level có thể là "INFO  " thay vì "INFO")
  #   - Xóa các field metadata của Filebeat không cần lưu ES
  # -----------------------------------------------------------
  mutate {
    add_field => {
      "host_name" => "%{[host][name]}"
    }
    strip        => ["log_level", "logger", "thread"]
    remove_field => ["agent", "ecs", "input", "log"]
  }

}
# =============================================================

output {

  # -----------------------------------------------------------
  # Output 1: Elasticsearch — mở rộng từ config cũ
  #
  # Thay đổi so với config cũ:
  #   - Thêm document_id = trace_id để tránh duplicate
  #     khi Filebeat retry (mất mạng, restart container)
  #   - Giữ nguyên index pattern sys-logs-{env}-{date}
  # -----------------------------------------------------------
  if "_grokparsefailure" not in [tags] {
    elasticsearch {
      hosts       => ["http://log-monitor-elasticsearch:9200"]
      index       => "sys-logs-%{environment}-%{+YYYY.MM.dd}"
      document_id => "%{trace_id}"
    }
  }

  # -----------------------------------------------------------
  # Output 2: Webhook alert — chỉ bắn khi gặp ERROR
  #
  # Thêm mới so với config cũ.
  # Alert Service (Spring Boot) nhận POST này và gửi Telegram.
  # -----------------------------------------------------------
  # if [log_level] == "ERROR" and "_grokparsefailure" not in [tags] {
  #   http {
  #     url    => "http://log-monitor-backend:8080/api/alert/webhook"
  #     method => "post"
  #     format => "json"
  #     mapping => {
  #       "level"       => "%{log_level}"
  #       "service"     => "%{app_name}"
  #       "environment" => "%{environment}"
  #       "message"     => "%{log_message}"
  #       "trace_id"    => "%{trace_id}"
  #       "logger"      => "%{logger}"
  #       "thread"      => "%{thread}"
  #       "host"        => "%{host_name}"
  #       "timestamp"   => "%{@timestamp}"
  #     }
  #   }
  # }

  # -----------------------------------------------------------
  # Output 3: stdout debug — giữ nguyên như config cũ
  # Tắt khi deploy thật để tránh flood log Logstash container
  # -----------------------------------------------------------
  stdout {
    codec => rubydebug
  }

}