name: Log Monitor Backend CI/CD

on:
    push:
        branches: [develop, main]
        paths:
            - "log-monitor-backend/**"
            - ".github/workflows/backend-ci-cd.yml"
    pull_request:
        branches: [develop, main]
        paths:
            - "log-monitor-backend/**"
            - ".github/workflows/backend-ci-cd.yml"

env:
    JAVA_VERSION: "21"
    BACKEND_CONTEXT: ./log-monitor-backend
    DOCKER_IMAGE_NAME: log-monitor-backend

jobs:
    # =========================================================
    # JOB 1: CHẠY UNIT TEST & INTEGRATION TEST
    # =========================================================
    backend-test:
        name: Backend Test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: ${{ env.JAVA_VERSION }}
                  cache: "maven"

            - name: Run Tests
              run: mvn -B clean test
              working-directory: ${{ env.BACKEND_CONTEXT }}

    # =========================================================
    # JOB 2: BUILD DOCKER IMAGE VÀ ĐẨY LÊN DOCKER HUB
    # =========================================================
    build-and-push:
        name: Build & Push Docker
        runs-on: ubuntu-latest
        needs: [backend-test]
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push to Docker Hub
              run: |
                  IMAGE_TAG=${GITHUB_SHA::7}
                  REPO_PATH="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}"

                  docker build -t $REPO_PATH:latest \
                               -t $REPO_PATH:$IMAGE_TAG \
                               ${{ env.BACKEND_CONTEXT }}
                               
                  docker push $REPO_PATH:$IMAGE_TAG
                  docker push $REPO_PATH:latest

    # =========================================================
    # JOB 3: SSH VÀO SERVER EC2 VÀ DEPLOY QUA DOCKER COMPOSE
    # =========================================================
    deploy-to-ec2:
        name: Deploy to AWS EC2
        runs-on: ubuntu-latest
        needs: [build-and-push]
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        steps:
            - name: Execute Remote SSH Commands to Deploy
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  port: 22
                  script: |
                      # Di chuyển vào thư mục chứa dự án trên EC2
                      cd /opt/log-monitor

                      echo "--------- Đăng nhập vào Docker Hub trên EC2 ---------"
                      docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

                      echo "--------- Pull Image Backend mới nhất về ---------"
                      docker compose pull backend

                      echo "--------- Khởi chạy / Cập nhật Container Backend (Zero-downtime) ---------"
                      docker compose up -d backend
                                  
                      echo "--------- Dọn dẹp các Docker Image cũ không dùng đến ---------"
                      docker image prune -f
